<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מעקב צנצנת מכירות</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0d2b5e 0%, #1a4a8a 50%, #0d2b5e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      color: #fff;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 8px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .subtitle {
      color: #a8c8ff;
      font-size: 0.95rem;
      margin-bottom: 36px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 18px;
      padding: 36px 40px;
      width: 100%;
      max-width: 560px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }

    .drop-zone {
      border: 2px dashed rgba(100,180,255,0.5);
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #5eb0ff;
      background: rgba(94,176,255,0.08);
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer;
    }
    .drop-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .drop-text { color: #a8c8ff; font-size: 0.95rem; }
    .drop-text strong { color: #fff; }
    .file-chosen { margin-top: 10px; color: #7dd87d; font-size: 0.9rem; font-weight: 600; }

    .btn {
      display: block;
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-generate {
      background: linear-gradient(135deg, #f6c200, #ff9000);
      color: #1a1a1a;
      box-shadow: 0 4px 16px rgba(246,194,0,0.35);
    }
    .btn-generate:hover { box-shadow: 0 6px 24px rgba(246,194,0,0.55); }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .spinner {
      display: none;
      width: 22px; height: 22px;
      border: 3px solid rgba(0,0,0,0.2);
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(220,40,40,0.2);
      border: 1px solid rgba(220,40,40,0.5);
      border-radius: 8px;
      color: #ff8080;
      font-size: 0.9rem;
    }

    /* ── result area ── */
    .result-area {
      display: none;
      width: 100%;
      max-width: 840px;
      margin-top: 40px;
    }

    .result-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 18px;
      padding: 28px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      text-align: center;
    }

    .result-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 18px;
      color: #a8c8ff;
    }

    .result-img {
      max-width: 100%;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    .stats-row {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .stat-box {
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px 20px;
      min-width: 140px;
    }
    .stat-label { font-size: 0.78rem; color: #7aacdd; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 1.25rem; font-weight: 700; margin-top: 4px; }

    .btn-download {
      display: inline-block;
      margin-top: 22px;
      padding: 12px 36px;
      background: linear-gradient(135deg, #1a8a3a, #27c455);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(39,196,85,0.35);
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .btn-download:hover { box-shadow: 0 6px 24px rgba(39,196,85,0.55); }
    .btn-download:active { transform: scale(0.98); }

    .btn-download-ppt {
      display: inline-block;
      margin-top: 22px;
      margin-left: 14px;
      padding: 12px 36px;
      background: linear-gradient(135deg, #c25a00, #f07c20);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(240,124,32,0.35);
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .btn-download-ppt:hover { box-shadow: 0 6px 24px rgba(240,124,32,0.55); }
    .btn-download-ppt:active { transform: scale(0.98); }

    .btn-download-ppt.loading,
    .btn-download.loading { opacity: 0.6; cursor: not-allowed; pointer-events: none; }
  </style>
</head>
<body>

  <h1>🫙 מעקב צנצנת מכירות</h1>
  <p class="subtitle">העלו את קובץ האקסל החודשי שלכם ליצירת הדמיית הצנצנת</p>

  <div class="card">
    <form id="uploadForm">
      <div class="drop-zone" id="dropZone">
        <div class="drop-icon">📊</div>
        <p class="drop-text"><strong>לחצו לבחירת קובץ</strong> או גררו ושחררו את קובץ האקסל</p>
        <p class="drop-text" style="margin-top:6px;font-size:0.82rem;">נתמך: .xlsx, .xlsm</p>
        <p class="file-chosen" id="fileChosen"></p>
        <input type="file" id="fileInput" name="file" accept=".xlsx,.xlsm" required />
      </div>

      <button type="submit" class="btn btn-generate" id="genBtn">
        <span id="btnLabel">✨ צור תמונה</span>
        <span class="spinner" id="spinner"></span>
      </button>
    </form>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="result-area" id="resultArea">
    <div class="result-card">
      <p class="result-title">צנצנת המכירות שלך — תמונה שנוצרה</p>
      <img id="resultImg" class="result-img" src="" alt="Sales Jar Tracker" />

      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-label">מכירות נוכחיות</div>
          <div class="stat-value" id="statCurrent">—</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">יעד חודשי</div>
          <div class="stat-value" id="statTarget">—</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">התקדמות</div>
          <div class="stat-value" id="statPct">—</div>
        </div>
      </div>

      <a class="btn-download" id="downloadBtn" href="#" onclick="downloadImage(event)">
        ⬇ הורד PNG
      </a>
      <a class="btn-download-ppt" id="downloadPptBtn" href="#" onclick="downloadPpt(event)">
        📊 הורד PPT
      </a>
    </div>
  </div>

<script>
  const form      = document.getElementById("uploadForm");
  const fileInput = document.getElementById("fileInput");
  const dropZone  = document.getElementById("dropZone");
  const fileChosen= document.getElementById("fileChosen");
  const genBtn    = document.getElementById("genBtn");
  const btnLabel  = document.getElementById("btnLabel");
  const spinner   = document.getElementById("spinner");
  const errorMsg  = document.getElementById("errorMsg");
  const resultArea= document.getElementById("resultArea");
  const resultImg = document.getElementById("resultImg");

  // drag & drop highlight
  dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
  dropZone.addEventListener("dragleave",() => dropZone.classList.remove("drag-over"));
  dropZone.addEventListener("drop", e => {
    e.preventDefault(); dropZone.classList.remove("drag-over");
    fileInput.files = e.dataTransfer.files;
    updateFileName();
  });
  fileInput.addEventListener("change", updateFileName);

  function updateFileName() {
    const name = fileInput.files[0]?.name || "";
    fileChosen.textContent = name ? `✔ ${name}` : "";
  }

  function setLoading(on) {
    genBtn.disabled = on;
    btnLabel.style.display = on ? "none" : "inline";
    spinner.style.display  = on ? "inline-block" : "none";
  }

  function showError(msg) {
    errorMsg.textContent = "⚠ " + msg;
    errorMsg.style.display = "block";
  }

  function hideError() { errorMsg.style.display = "none"; }

  function fmt(n) {
    return "$" + Number(n).toLocaleString("en-US", {maximumFractionDigits: 0});
  }

  form.addEventListener("submit", async e => {
    e.preventDefault();
    hideError();
    resultArea.style.display = "none";

    if (!fileInput.files.length) { showError("אנא בחרו קובץ אקסל."); return; }

    setLoading(true);
    const fd = new FormData();
    fd.append("file", fileInput.files[0]);

    try {
      const res  = await fetch("/generate", { method: "POST", body: fd });
      const data = await res.json();

      if (!res.ok || data.error) { showError(data.error || "שגיאה לא ידועה."); return; }

      resultImg.src = data.image;
      document.getElementById("statCurrent").textContent = fmt(data.current_sales);
      document.getElementById("statTarget").textContent  = fmt(data.target);
      document.getElementById("statPct").textContent     = data.fill_pct + "%";
      resultArea.style.display = "block";
      resultArea.scrollIntoView({ behavior: "smooth", block: "start" });

    } catch (err) {
      showError("שגיאת רשת. האם השרת פועל?");
    } finally {
      setLoading(false);
    }
  });

  async function downloadImage(e) {
    e.preventDefault();
    if (!fileInput.files.length) { showError("אנא צרו תמונה תחילה."); return; }

    const fd = new FormData();
    fd.append("file", fileInput.files[0]);

    const res = await fetch("/download", { method: "POST", body: fd });
    if (!res.ok) { showError("ההורדה נכשלה."); return; }

    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = "sales_jar_tracker.png"; a.click();
    URL.revokeObjectURL(url);
  }
  async function downloadPpt(e) {
    e.preventDefault();
    if (!fileInput.files.length) { showError("אנא צרו תמונה תחילה."); return; }

    const btn = document.getElementById("downloadPptBtn");
    btn.classList.add("loading");
    btn.textContent = "⏳ יוצר PPT…";

    const fd = new FormData();
    fd.append("file", fileInput.files[0]);

    try {
      const res = await fetch("/download_ppt", { method: "POST", body: fd });
      if (!res.ok) { showError("הורדת PPT נכשלה."); return; }

      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href = url; a.download = "sales_jar_tracker.pptx"; a.click();
      URL.revokeObjectURL(url);
    } catch (err) {
      showError("שגיאת רשת בהורדת PPT.");
    } finally {
      btn.classList.remove("loading");
      btn.textContent = "📊 הורד PPT";
    }
  }
</script>
</body>
</html>
